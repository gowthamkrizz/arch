<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly Archaeology</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .auth-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .auth-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }

        .auth-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .auth-particle {
            position: absolute;
            background: rgba(255, 215, 0, 0.15);
            border-radius: 50%;
            animation: authFloat linear infinite;
        }

        @keyframes authFloat {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            z-index: 2;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            color: #fff;
            position: relative;
            animation: authSlideUp 0.8s ease forwards;
            transform: translateY(30px);
            opacity: 0;
        }

        @keyframes authSlideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary-color), transparent, var(--primary-color), transparent);
            background-size: 400% 400%;
            border-radius: 18px;
            z-index: -1;
            animation: authGlow 4s ease infinite;
            opacity: 0.3;
        }

        @keyframes authGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-card .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-card .auth-logo a {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .auth-card .auth-logo a:hover {
            transform: scale(1.05);
            text-shadow: 0 0 20px rgba(201, 151, 76, 0.3);
        }

        .auth-card .auth-logo img {
            height: 40px;
            width: auto;
        }

        .auth-card h2 {
            margin-bottom: 0.5rem;
            text-align: center;
            color: var(--primary-color);
            font-size: 2rem;
        }

        .auth-card .auth-subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .auth-card label {
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .auth-card input,
        .auth-card select {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 1rem;
            border-radius: 8px;
            width: 100%;
            transition: var(--transition);
            font-size: 1rem;
        }

        .auth-card input:focus,
        .auth-card select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(201, 151, 76, 0.15);
            background: rgba(255, 255, 255, 0.12);
        }

        .auth-card select option {
            background: var(--card-bg);
            color: var(--text-color);
        }

        .auth-card .form-group {
            margin-bottom: 1.2rem;
        }

        .auth-card .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-color), #b8860b);
            color: #fff;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            margin-top: 0.5rem;
            font-size: 1.05rem;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(201, 151, 76, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1), transparent 60%);
            transform: scale(0);
            transition: transform 0.5s ease;
        }

        .btn-login:hover::after {
            transform: scale(1);
        }

        .btn-login-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.9rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            margin-top: 1rem;
            text-align: center;
            display: inline-block;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-login-outline:hover {
            background: var(--primary-color);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(201, 151, 76, 0.3);
        }

        .btn-back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 3;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 0.7rem 1.5rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-back-home:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(201, 151, 76, 0.3);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            transition: var(--transition);
        }

        .input-wrapper input,
        .input-wrapper select {
            padding-left: 45px;
        }

        .input-wrapper input:focus+i,
        .input-wrapper select:focus+i {
            color: var(--primary-color);
        }

        @media screen and (max-width: 480px) {
            .auth-card {
                padding: 2rem;
                margin: 1rem;
            }
            .btn-back-home {
                top: 10px;
                left: 10px;
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <video class="auth-video-bg" autoplay muted loop playsinline>
            <source src=".//assets/images/319581.mp4" type="video/mp4">
        </video>
        
        <div class="auth-overlay"></div>
        <div class="auth-particles" id="authParticles"></div>

        <a href="index.html" class="btn-back-home">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html"><img src="assets/images/stackly-logo.webp" alt="Stackly Logo" style="height:45px; width:auto;"></a>
            </div>
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to continue your archaeological journey</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="Enter your email" required>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="role">Select Role</label>
                    <div class="input-wrapper">
                        <select id="role" name="role" required>
                            <option value="user">User</option>
                            <option value="researcher">Researcher</option>
                            <option value="admin">Admin</option>
                        </select>
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
                <a href="signup.html" class="btn-login-outline">
                    <i class="fa-solid fa-user-plus"></i> Don't have an account? Sign up here.
                </a>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const particlesContainer = document.getElementById('authParticles');
            if (particlesContainer) {
                for (let i = 0; i < 25; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('auth-particle');
                    const size = Math.random() * 6 + 3;
                    const posX = Math.random() * 100;
                    const duration = Math.random() * 15 + 10;
                    const delay = Math.random() * 10;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = posX + '%';
                    particle.style.animationDuration = duration + 's';
                    particle.style.animationDelay = delay + 's';
                    particlesContainer.appendChild(particle);
                }
            }

            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
            }
        });

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const name = email.split('@')[0];

            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }

            let dashboardUrl = '';
            if (role === 'admin') {
                dashboardUrl = `dashboard3.html?role=${role}&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}`;
            } else if (role === 'researcher') {
                dashboardUrl = `dashboard2.html?role=${role}&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}`;
            } else {
                dashboardUrl = `dashboard.html?role=${role}&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}`;
            }
            
            window.location.href = dashboardUrl;
        }
    </script>
</body>
</html>
